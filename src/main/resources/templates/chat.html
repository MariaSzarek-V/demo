<div th:replace="header"></div>

<!-- Begin Page Content -->
<div class="container-fluid px-2 px-md-4 px-lg-5">

  <!-- Page Heading -->
  <div class="d-sm-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800">Czat użytkowników</h1>
  </div>

  <!-- Wiadomości -->
  <div class="card shadow mb-4">
    <div class="card-body" style="max-height: 500px; overflow-y: auto;">
      <!-- Pojedyncza wiadomość -->
      <div th:each="message : ${messages}" class="mb-3 border-bottom pb-2">
        <div class="d-flex justify-content-between">
          <strong th:text="${message.username}">Nazwa użytkownika</strong>
          <small class="text-muted" th:text="${#temporals.format(message.createdAt, 'yyyy-MM-dd HH:mm')}">2025-01-01 12:00</small>
        </div>
        <p class="mb-1" th:text="${message.text}">Treść wiadomości...</p>
      </div>

      <!-- Brak wiadomości -->
      <div th:if="${#lists.isEmpty(messages)}" class="text-center text-muted">
        Brak wiadomości. Bądź pierwszy!
      </div>
    </div>
  </div>

  <!-- Formularz dodawania wiadomości -->
  <div class="card shadow">
    <div class="card-body">
      <form th:action="@{/chat/add}" th:object="${newMessage}" method="post">
        <div class="form-group">
          <label for="text">Napisz wiadomość:</label>
          <textarea id="text" th:field="*{text}" class="form-control" rows="3" required></textarea>
          <div th:if="${#fields.hasErrors('text')}" class="text-danger" th:errors="*{text}"></div>
        </div>
        <div class="text-end mt-3">
          <button type="submit" class="btn btn-primary">Wyślij</button>
        </div>
      </form>


    </div>
  </div>

</div>
<!-- /.container-fluid -->

</div>
<!-- End of Main Content -->

<div th:replace="footer"></div>
