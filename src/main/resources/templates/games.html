
<div th:replace="header"></div>
<!-- Begin Page Content -->
<div class="container-fluid px-2 px-md-4 px-lg-5">

    <!-- Page Heading -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">
            <i class="fas fa-futbol text-primary"></i> Moje mecze
        </h1>
    </div>

    <!-- Lista meczy - styl jak ranking -->
    <div class="card border-left-primary shadow mb-4">
        <div class="card-body" style="max-height: 500px; overflow-y: auto;">
            <div class="text-xs font-weight-bold text-primary text-uppercase mb-2">
            </div>
            <div th:if="${games != null and !games.isEmpty()}">
                <div class="games-list" style="font-size: 0.9rem;">
                    <div th:each="row, iterStat : ${games}"
                         th:if="${row != null}"
                         class="game-item d-flex flex-wrap justify-content-between align-items-center"
                         style="padding: 4px 8px; border-radius: 4px; margin-bottom: 4px; border-bottom: 1px solid #e3e6f0;">

                        <!-- Data i drużyny -->
                        <div class="game-header d-flex align-items-center" style="min-width: 0;">
                            <span class="game-date text-muted" style="display: inline-block; width: 140px;" th:text="${{row.gameDate}}"></span>

                            <!-- Desktop: drużyny w tej samej linii -->
                            <span class="game-teams-desktop" style="display: inline-block; min-width: 220px;">
                                <span th:class="'fi fi-' + ${row.homeCountryCode}" style="margin-right: 4px;"></span>
                                <span style="display: inline-block; width: 80px; text-align: right; font-weight: bold;" th:text="${{row.homeTeam}}"></span>
                                <strong class="text-primary" style="display: inline-block; width: 40px; text-align: center;">
                                    <span th:text="${{row.homeScore}}">-</span>:<span th:text="${{row.awayScore}}">-</span>
                                </strong>
                                <span style="display: inline-block; width: 80px; font-weight: bold;" th:text="${{row.awayTeam}}"></span>
                                <span th:class="'fi fi-' + ${row.awayCountryCode}" style="margin-left: 4px;"></span>
                            </span>
                        </div>

                        <!-- Linia 2 (tylko mobile): Drużyny -->
                        <div class="game-teams-mobile" style="display: none; width: 100%; padding-left: 30px;">
                            <span th:class="'fi fi-' + ${row.homeCountryCode}" style="margin-right: 4px;"></span>
                            <span style="font-weight: bold;" th:text="${{row.homeTeam}}"></span>
                            <strong class="text-primary mx-2">
                                <span th:text="${{row.homeScore}}">-</span>:<span th:text="${{row.awayScore}}">-</span>
                            </strong>
                            <span style="font-weight: bold;" th:text="${{row.awayTeam}}"></span>
                            <span th:class="'fi fi-' + ${row.awayCountryCode}" style="margin-left: 4px;"></span>
                        </div>

                        <!-- Linia 3: Typ, punkty i przyciski -->
                        <div class="game-actions d-flex align-items-center text-nowrap">
                            <span th:if="${row.predictionId != null}" class="text-muted mr-2">
                                <span class="badge badge-info badge-sm">
                                    <span th:text="${row.predictedHomeScore}"></span>:<span th:text="${row.predictedAwayScore}"></span>
                                </span>
                            </span>
                            <span th:if="${row.pointsId != null}"
                                  th:classappend="${row.points == 3} ? 'badge-success' : (${row.points == 1} ? 'badge-warning' : 'badge-secondary')"
                                  class="badge badge-sm mr-2">
                                <span th:text="${row.points}"></span> pkt
                            </span>
                            <a th:if="${row.predictionId == null and row.gameStatus != T(pl.xxx.demo.Enum.GameStatus).FINISHED and T(java.time.LocalDateTime).now().isBefore(row.gameDate)}"
                               th:href="@{/predictions/new/{id}(id=${row.gameId})}"
                               class="btn btn-xs btn-primary mr-1">
                                <i class="fas fa-futbol"></i> Typuj
                            </a>
                            <a th:if="${row.predictionId != null and row.gameStatus != T(pl.xxx.demo.Enum.GameStatus).FINISHED and T(java.time.LocalDateTime).now().isBefore(row.gameDate)}"
                               th:href="@{/predictions/edit/{id}(id=${row.predictionId})}"
                               class="btn btn-xs btn-outline-primary mr-1">
                                <i class="fas fa-edit"></i> Edytuj
                            </a>
                            <form th:if="${row.predictionId != null and row.gameStatus != T(pl.xxx.demo.Enum.GameStatus).FINISHED and T(java.time.LocalDateTime).now().isBefore(row.gameDate)}"
                                  th:action="@{/predictions/delete/{id}(id=${row.predictionId})}"
                                  method="post"
                                  onsubmit="return confirm('Czy na pewno chcesz usunąć ten typowany wynik?');"
                                  style="display: inline;">
                                <button type="submit" class="btn btn-xs btn-outline-danger mr-1">
                                    <i class="fas fa-trash"></i> Usuń
                                </button>
                            </form>
                            <a th:if="${row.gameStatus == T(pl.xxx.demo.Enum.GameStatus).FINISHED}"
                               th:href="@{/results/{id}(id=${row.gameId})}"
                               class="btn btn-xs btn-outline-info">
                                <i class="fas fa-search"></i> Wyniki
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${games == null or games.isEmpty()}">
                <p class="text-muted mb-0 text-center py-3">
                    <i class="fas fa-futbol fa-2x mb-2 text-gray-300 d-block"></i>
                    Brak meczy do wyświetlenia
                </p>
            </div>
        </div>
    </div>

</div>
<!-- /.container-fluid -->

<!-- End of Main Content -->

<div th:replace="footer"></div>
