
<div th:replace="header"></div>
<!-- Begin Page Content -->
<div class="container-fluid px-2 px-md-4 px-lg-5">

  <!-- Page Heading -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800">
      <i class="fas fa-trophy text-warning"></i> Ranking graczy
    </h1>
  </div>

  <!-- Ranking - styl mini ranking z dashboardu -->
  <div class="card border-left-warning shadow mb-4">
    <div class="card-body">
      <div class="text-xs font-weight-bold text-warning text-uppercase mb-2">
        🏆 Pełny Ranking
      </div>
      <div th:if="${ranking != null and !ranking.isEmpty()}">
        <div class="ranking-list" style="font-size: 0.9rem;">
          <div th:each="row, iterStat : ${ranking}"
               th:if="${row != null}"
               style="padding: 4px 8px; border-radius: 4px; margin-bottom: 4px;">
            <span th:class="${iterStat.index == 0} ? 'text-warning' : (${iterStat.index == 1} ? 'text-secondary' : (${iterStat.index == 2} ? 'text-info' : 'text-gray-800'))">
              #<span th:text="${row.position}"></span>
            </span>
            <span th:text="${row.username}"
                  class="ml-2 text-gray-700"></span>
            <span class="float-right text-gray-800">
              <span th:text="${row.totalPoints}"></span> pkt
            </span>
            <span th:if="${row.positionChange != null and row.positionChange != 0}"
                  th:classappend="${row.positionChange > 0} ? 'text-success' : 'text-danger'"
                  class="ml-2 small">
              <i th:class="${row.positionChange > 0} ? 'fas fa-arrow-up' : 'fas fa-arrow-down'"></i>
              <span th:text="${row.positionChange}"></span>
            </span>
          </div>
        </div>
      </div>
      <div th:if="${ranking == null or ranking.isEmpty()}">
        <p class="text-muted mb-0">Ranking pojawi się po pierwszym meczu</p>
      </div>
    </div>
  </div>

</div>
<!-- /.container-fluid -->

</div>
<!-- End of Main Content -->
<div th:replace="footer"></div>
