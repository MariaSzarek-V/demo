<div th:replace="header"></div>
<!-- Begin Page Content -->
<div class="container-fluid px-2 px-md-4 px-lg-5">

  <!-- Content Row - Statystyki -->
  <div class="row mt-4">

    <!-- Mini Ranking -->
    <div class="col-xl-12 col-md-12 mb-6">
      <div class="card border-left-warning shadow h-100 py-2">
        <div class="card-body">
          <div class="text-xs font-weight-bold text-warning text-uppercase mb-2">
            🏆 Mini Ranking
          </div>
          <div th:if="${stats.miniRanking != null and !stats.miniRanking.isEmpty()}">
            <div class="ranking-list" style="font-size: 0.9rem;">
              <div th:each="rank, iterStat : ${stats.miniRanking}">
                <!-- Separator jeśli rank == null -->
                <div th:if="${rank == null}"
                     style="text-align: center; color: #858796; padding: 2px 0; margin: 4px 0;">
                  ⋯
                </div>
                <!-- Osoba z rankingu jeśli rank != null -->
                <div th:if="${rank != null}"
                     th:classappend="${rank.isCurrentUser} ? 'font-weight-bold bg-light' : ''"
                     style="padding: 4px 8px; border-radius: 4px; margin-bottom: 4px;">
                  <span th:class="${iterStat.index == 0} ? 'text-warning' : (${iterStat.index == 1} ? 'text-secondary' : (${iterStat.index == 2} ? 'text-info' : 'text-gray-800'))">
                    #<span th:text="${rank.position}"></span>
                  </span>
                  <span th:text="${rank.username}"
                        th:classappend="${rank.isCurrentUser} ? 'text-primary' : 'text-gray-700'"
                        class="ml-2"></span>
                  <span class="float-right text-gray-800">
                    <span th:text="${rank.totalPoints}"></span> pkt
                  </span>
                </div>
              </div>
            </div>
            <div class="mt-2 text-center">
              <a href="/ranking" class="btn btn-sm btn-outline-warning">
                <i class="fas fa-list"></i> Pełny ranking
              </a>
            </div>
          </div>
          <div th:if="${stats.miniRanking == null or stats.miniRanking.isEmpty()}">
            <p class="text-muted mb-0">Brak danych rankingu</p>
          </div>
        </div>
      </div>
    </div>

  </div>


  <!-- Najbliższe mecze - jedna karta -->
    <div class="card border-left-info shadow mb-4 mt-4" th:if="${stats.upcomingGames != null and !stats.upcomingGames.isEmpty()}">
        <div class="card-body">
            <div class="text-xs font-weight-bold text-info text-uppercase mb-2">
                📅 Najbliższe mecze
            </div>
            <div class="games-list" style="font-size: 0.9rem;">
                <div th:each="game : ${stats.upcomingGames}"
                     style="padding: 8px; border-radius: 4px; margin-bottom: 8px; border-bottom: 1px solid #e3e6f0;">
                    <div class="text-muted" style="font-size: 0.85rem;" th:text="${#temporals.format(game.gameDate, 'dd.MM.yyyy HH:mm')}"></div>
                    <div class="font-weight-bold text-gray-800">
                        <a th:href="@{/results/{id}(id=${game.gameId})}"
                           class="text-gray-800 text-decoration-none"
                           style="transition: color 0.2s;"
                           onmouseover="this.style.color='#4e73df'"
                           onmouseout="this.style.color=''"
                           title="Zobacz szczegóły meczu">
                            <span th:class="'fi fi-' + ${game.homeCountryCode}" style="margin-right: 4px;"></span>
                            <span th:text="${game.homeTeam}"></span> : <span th:text="${game.awayTeam}"></span>
                            <span th:class="'fi fi-' + ${game.awayCountryCode}" style="margin-left: 4px;"></span>
                        </a>
                    </div>
                    <div class="mt-1" th:if="${!game.hasPrediction}">
                        <a th:href="@{/predictions/new/{id}(id=${game.gameId})}"
                           class="btn btn-primary btn-xs">
                            <i class="fas fa-futbol"></i> Typuj wynik
                        </a>
                    </div>
                    <div class="mt-1" th:if="${game.hasPrediction}">
                        <span class="text-success">
                            <i class="fas fa-check-circle"></i>
                            Twój typ: <span th:text="${game.predictedHomeScore}"></span>:<span th:text="${game.predictedAwayScore}"></span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Ostatnie mecze - jedna karta -->
    <div class="card border-left-warning shadow mb-4" th:if="${stats.recentGames != null and !stats.recentGames.isEmpty()}">
        <div class="py-3 card-header">
            <h6 class="m-0 fw-bold text-danger text-uppercase">⏱️ Ostatnie mecze</h6>
        </div>
        <div class="card-body">
            <div class="games-list" style="font-size: 0.9rem;">
                <div th:each="game : ${stats.recentGames}"
                     style="padding: 8px; border-radius: 4px; margin-bottom: 8px; border-bottom: 1px solid #e3e6f0;">
                    <div class="text-muted" style="font-size: 0.85rem;" th:text="${#temporals.format(game.gameDate, 'dd.MM.yyyy HH:mm')}"></div>
                    <div class="font-weight-bold text-gray-800" style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <a th:href="@{/results/{id}(id=${game.gameId})}"
                               class="text-gray-800 text-decoration-none"
                               style="transition: color 0.2s;"
                               onmouseover="this.style.color='#4e73df'"
                               onmouseout="this.style.color=''"
                               title="Zobacz szczegóły meczu">
                                <span th:class="'fi fi-' + ${game.homeCountryCode}" style="margin-right: 4px;"></span>
                                <span th:text="${game.homeTeam}"></span>
                                <span th:text="${game.homeScore}"></span>:<span th:text="${game.awayScore}"></span>
                                <span th:text="${game.awayTeam}"></span>
                                <span th:class="'fi fi-' + ${game.awayCountryCode}" style="margin-left: 4px;"></span>

                                <!-- Typ -->
                                <span th:if="${game.hasPrediction}" class="text-muted" style="font-size: 0.9rem;">
                                    <small>(<span th:text="${game.predictedHomeScore}"></span>:<span th:text="${game.predictedAwayScore}"></span>)</small>
                                </span>

                                <!-- Gdy brak typu -->
                                <span th:if="${!game.hasPrediction}" class="text-muted">
                                    <small><i class="fas fa-times-circle"></i> Brak typu</small>
                                </span>
                            </a>
                        </div>

                        <!-- Punkty po prawej stronie -->
                        <div th:if="${game.hasPrediction and game.points != null}" style="margin-left: 10px;">
                            <span th:classappend="${game.points == 3} ? 'text-success' : (${game.points == 1} ? 'text-warning' : 'text-danger')"
                                  style="font-weight: bold; font-size: 1.1rem;"
                                  th:text="'+' + ${game.points} + ' pkt'"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </div>

    <!-- Komunikat gdy brak meczów -->
    <div class="card border-left-secondary shadow mb-4 mt-4" th:if="${(stats.upcomingGames == null or stats.upcomingGames.isEmpty()) and (stats.recentGames == null or stats.recentGames.isEmpty())}">
        <div class="card-body text-center">
            <p class="text-gray-600 mb-0">
                <i class="fas fa-info-circle"></i>
                Brak meczów do wyświetlenia
            </p>
        </div>
    </div>

    <!-- Content Row - Wykres liniowy i Donut obok siebie -->
    <div class="row">

        <!-- Wykres pozycji w rankingu (lewa strona) -->
        <div class="col-12">
            <div class="card shadow mb-4">
                <div class="py-3 card-header">
                    <h6 class="m-0 fw-bold text-primary text-uppercase">📊 Historia pozycji w rankingu</h6>
                </div>
                <div class="card-body">
                    <div class="chart-area">
                        <canvas id="rankingChart" style="height: 300px;"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
<!-- /.container-fluid -->

</div>
<!-- End of Main Content -->

<!-- Dodaj Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script th:inline="javascript">
/*<![CDATA[*/
    // Pobierz dane z Thymeleaf
    var gameLabels = /*[[${stats.gameLabels}]]*/ [];
    var rankingPositions = /*[[${stats.rankingPositions}]]*/ [];

    // Pobierz dane wszystkich użytkowników
    var allUsersHistory = /*[[${stats.allUsersRankingHistory}]]*/ [];
    var currentUsername = /*[[${username}]]*/ '';
    
    // Przygotuj datasety dla wszystkich użytkowników
    var datasets = [];
    // Rozszerzona paleta kolorów z szablonu SB Admin 2
    var colors = [
        '#4e73df',  // blue (primary)
        '#1cc88a',  // green (success)
        '#36b9cc',  // cyan (info)
        '#f6c23e',  // yellow (warning)
        '#fd7e14',  // orange
        '#6610f2',  // indigo
        '#6f42c1',  // purple
        '#e83e8c',  // pink
        '#20c9a6',  // teal
        '#858796',  // secondary
        '#2e59d9',  // darker blue
        '#17a673',  // darker green
        '#2c9faf',  // darker cyan
        '#e0a800',  // darker yellow
        '#e85d04',  // darker orange
        '#5a0fc8',  // darker indigo
        '#5a2e91',  // darker purple
        '#c7365f',  // darker pink
        '#1a9d7c',  // darker teal
        '#6c757d'   // gray
    ];

    allUsersHistory.forEach(function(userHistory, index) {
        var isCurrentUser = userHistory.username === currentUsername;
        // Zalogowany użytkownik: czerwony i bardzo pogrubiony, inni: kolory z palety
        var color = isCurrentUser ? '#e74a3b' : colors[index % colors.length];

        datasets.push({
            label: userHistory.username,
            data: userHistory.positions,
            borderColor: color,
            backgroundColor: 'rgba(78, 115, 223, 0.05)',
            borderWidth: isCurrentUser ? 6 : 2,
            hoverBorderWidth: isCurrentUser ? 6 : 2,  // Taka sama grubość po najechaniu
            tension: 0,
            fill: false,
            pointRadius: isCurrentUser ? 6 : 3,
            pointBackgroundColor: color,
            pointBorderColor: '#fff',
            pointBorderWidth: isCurrentUser ? 2 : 1,
            pointHoverRadius: isCurrentUser ? 8 : 5,
            hidden: false
        });
    });
    
    // Wykres pozycji w rankingu - wszystkie użytkownicy
    var ctx = document.getElementById('rankingChart').getContext('2d');
    var rankingChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: gameLabels,
            datasets: datasets
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'nearest',
                axis: 'x',
                intersect: false
            },
            onHover: function(event, activeElements) {
                // Reset wszystkich linii do normalnej grubości (oprócz zalogowanego użytkownika)
                rankingChart.data.datasets.forEach(function(dataset) {
                    var isCurrentUser = dataset.label === currentUsername;
                    dataset.borderWidth = isCurrentUser ? 6 : 2;
                });

                // Pogrub linię pod kursorem (jeśli to nie zalogowany użytkownik)
                if (activeElements.length > 0) {
                    var hoveredIndex = activeElements[0].datasetIndex;
                    var isCurrentUser = rankingChart.data.datasets[hoveredIndex].label === currentUsername;
                    if (!isCurrentUser) {
                        rankingChart.data.datasets[hoveredIndex].borderWidth = 4;
                    }
                }

                rankingChart.update('none'); // Update bez animacji
            },
            scales: {
                y: {
                    reverse: true, // Odwróć oś Y (1 na górze = najlepszy)
                    beginAtZero: false,
                    ticks: {
                        stepSize: 1,
                        autoSkip: false, // Pokaż wszystkie pozycje
                        callback: function(value) {
                            return '#' + value; // Dodaj # przed numerem pozycji
                        }
                    },
                    grid: {
                        display: true, // Pokaż linie pomocnicze dla każdej pozycji
                        drawBorder: true,
                        color: 'rgba(0, 0, 0, 0.1)'
                    },
                    title: {
                        display: true,
                        text: 'Pozycja w rankingu'
                    }
                },
                x: {
                    title: {
                        display: true,
                        text: 'Mecze'
                    },
                    ticks: {
                        maxRotation: 90,
                        minRotation: 90
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    enabled: true,
                    mode: 'index',
                    intersect: false,
                    itemSort: function(a, b) {
                        // Sortuj pozycje rosnąco (#1 na górze)
                        return a.parsed.y - b.parsed.y;
                    },
                    callbacks: {
                        title: function(context) {
                            // Pokaż nazwę meczu jako tytuł tooltip
                            return context[0].label;
                        },
                        label: function(context) {
                            // Format: "#pozycja - imie"
                            // Chart.js automatycznie pokazuje kolorowy kwadrat przed każdą linią
                            return '#' + context.parsed.y + ' - ' + context.dataset.label;
                        }
                    }
                }
            }
        }
    });
/*]]>*/
</script>

<div th:replace="footer"></div>
